query GetCountries {
  countries {
    code
    name
    emoji
    continent {
      name
    }
  }
}

query GetCountry($code: ID!) {
  country(code: $code) {
    code
    name
    native
    phone
    capital
    currency
    emoji
    continent {
      name
    }
    languages {
      name
    }
  }
}

query GetContinents {
  continents {
    code
    name
  }
}